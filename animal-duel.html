<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIMEL DUELS ⚔️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:'Fredoka One',cursive;width:100vw;height:100vh;overflow:hidden;position:relative;}

/* ══ BACKGROUND SYSTEM ══ */
#sky{position:fixed;inset:0;z-index:0;transition:background 1.8s ease,filter 1.8s ease;}
#ground{position:fixed;bottom:0;left:0;right:0;height:32%;z-index:1;transition:background 1.8s ease;}
#grass{position:fixed;bottom:32%;left:0;right:0;height:8px;z-index:2;transition:background 1.8s ease;}

/* ── Default (Jerusalem / Holy Land) ── */
.sky-jerusalem{background:linear-gradient(180deg,#E8C97A 0%,#F0DFA0 40%,#D4A843 100%);}
.gnd-jerusalem{background:linear-gradient(180deg,#C4943A 0%,#A0702A 60%,#7A5020 100%);}
.grs-jerusalem{background:#B8860B;}

/* ── Rome ── */
.sky-rome{background:linear-gradient(180deg,#7FB3D3 0%,#A8CCE8 50%,#C8E0F0 100%);}
.gnd-rome{background:linear-gradient(180deg,#8B7355 0%,#6B5335 60%,#4A3520 100%);}
.grs-rome{background:#6B8E23;}

/* ── Egypt ── */
.sky-egypt{background:linear-gradient(180deg,#FF9500 0%,#FFCC44 30%,#FFE58A 100%);}
.gnd-egypt{background:linear-gradient(180deg,#C8A84B 0%,#A88030 60%,#806018 100%);}
.grs-egypt{background:#C8A84B;}

/* ── Mongolia / Steppe ── */
.sky-mongolia{background:linear-gradient(180deg,#2E86AB 0%,#57A0C8 50%,#A8D4EA 100%);}
.gnd-mongolia{background:linear-gradient(180deg,#8B7A3A 0%,#6B5A2A 60%,#4A3A18 100%);}
.grs-mongolia{background:#7A8B3A;}

/* ── France (Napoleon) ── */
.sky-france{background:linear-gradient(180deg,#002395 0%,#1A3AA8 40%,#4A6AC8 100%);}
.gnd-france{background:linear-gradient(180deg,#2D5A1B 0%,#1A3A0A 60%,#0D2005 100%);}
.grs-france{background:#3A7A20;}

/* ── Germany (Nazi era) ── */
.sky-germany{background:linear-gradient(180deg,#888888 0%,#AAAAAA 50%,#CCCCCC 100%);}
.gnd-germany{background:linear-gradient(180deg,#2A3A2A 0%,#1A2A1A 60%,#0D1A0D 100%);}
.grs-germany{background:#3A4A2A;}

/* ── Soviet Russia ── */
.sky-russia{background:linear-gradient(180deg,#8B0000 0%,#AA1A1A 40%,#CC3333 100%);}
.gnd-russia{background:linear-gradient(180deg,#FFFFFF 0%,#DDDDDD 30%,#AAAAAA 100%);}
.grs-russia{background:#888888;}

/* ── North Korea ── */
.sky-northkorea{background:linear-gradient(180deg,#CC0000 0%,#990000 50%,#660000 100%);}
.gnd-northkorea{background:linear-gradient(180deg,#1A3A1A 0%,#0D2A0D 60%,#051505 100%);}
.grs-northkorea{background:#2A4A2A;}

/* ── Iraq / Middle East ── */
.sky-iraq{background:linear-gradient(180deg,#D2691E 0%,#E8A84A 40%,#F5CC7A 100%);}
.gnd-iraq{background:linear-gradient(180deg,#A0702A 0%,#785018 60%,#503508 100%);}
.grs-iraq{background:#8B6914;}

/* ── Venezuela ── */
.sky-venezuela{background:linear-gradient(180deg,#CF142B 0%,#006BBF 50%,#CE1126 100%);}
.gnd-venezuela{background:linear-gradient(180deg,#007A33 0%,#005522 60%,#003311 100%);}
.grs-venezuela{background:#228B22;}

/* ── China ── */
.sky-china{background:linear-gradient(180deg,#DE2910 0%,#C01A0A 50%,#A00A00 100%);}
.gnd-china{background:linear-gradient(180deg,#2D6A1A 0%,#1A4A0A 60%,#0D2A05 100%);}
.grs-china{background:#3A7A2A;}

/* ── Rainbow (chaos mode) ── */
.sky-rainbow{animation:rbSky 3s linear infinite;}
.gnd-rainbow{animation:rbGnd 3s linear infinite;}
.grs-rainbow{animation:rbGrs 3s linear infinite;}
@keyframes rbSky{0%{background:linear-gradient(180deg,#FF6B6B,#FFB347);}25%{background:linear-gradient(180deg,#FFE66D,#6BCB77);}50%{background:linear-gradient(180deg,#4D96FF,#C77DFF);}75%{background:linear-gradient(180deg,#FF8FAB,#FF6B6B);}100%{background:linear-gradient(180deg,#FF6B6B,#FFB347);}}
@keyframes rbGnd{0%{background:#2D6A4F;}25%{background:#3A5A2A;}50%{background:#2D4A7A;}75%{background:#4A2A5A;}100%{background:#2D6A4F;}}
@keyframes rbGrs{0%{background:#4CAF50;}50%{background:#9C27B0;}100%{background:#4CAF50;}}

/* ── BACKGROUND DETAILS ── */
/* Sun */
#sun{position:fixed;top:6%;left:50%;transform:translateX(-50%);
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle,#FFE55A 40%,#FFB800 100%);
  box-shadow:0 0 0 10px rgba(255,220,0,0.15),0 0 0 24px rgba(255,200,0,0.08);
  animation:sunPulse 3s ease-in-out infinite;transition:opacity 1.5s;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 0 10px rgba(255,220,0,0.18),0 0 0 24px rgba(255,200,0,0.08)}50%{box-shadow:0 0 0 18px rgba(255,220,0,0.2),0 0 0 38px rgba(255,200,0,0.1)}}

/* Pyramid for egypt */
#pyramid{position:fixed;bottom:32%;left:10%;z-index:2;width:0;height:0;
  border-left:50px solid transparent;border-right:50px solid transparent;
  border-bottom:70px solid rgba(180,140,60,0.7);opacity:0;transition:opacity 1.5s;}
/* Colosseum silhouette for rome */
#colosseum{position:fixed;bottom:32%;left:8%;z-index:2;opacity:0;transition:opacity 1.5s;
  width:80px;height:44px;background:rgba(120,100,70,0.55);border-radius:12px 12px 0 0;}
#colosseum::before{content:'';position:absolute;top:10px;left:8px;right:8px;height:34px;
  background:rgba(90,70,40,0.55);border-radius:8px 8px 0 0;}
/* Kremlin for russia */
#kremlin{position:fixed;bottom:32%;left:8%;z-index:2;opacity:0;transition:opacity 1.5s;}
#kremlin-tower{width:22px;height:50px;background:rgba(200,40,40,0.55);position:relative;}
#kremlin-dome{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;
  border-bottom:18px solid rgba(255,215,0,0.7);}
/* Eiffel for france */
#eiffel{position:fixed;bottom:32%;right:10%;z-index:2;opacity:0;transition:opacity 1.5s;
  width:0;height:0;border-left:24px solid transparent;border-right:24px solid transparent;
  border-bottom:70px solid rgba(80,80,120,0.5);}
#eiffel::before{content:'';position:absolute;top:16px;left:-14px;right:-14px;
  border-left:14px solid transparent;border-right:14px solid transparent;
  border-bottom:54px solid rgba(80,80,120,0.5);width:0;height:0;}
/* Stars for sparkles */
#sparkles{position:fixed;inset:0;z-index:2;opacity:0;transition:opacity 1s;pointer-events:none;}
.sparkle{position:absolute;font-size:20px;animation:spk 4s ease-in-out infinite;}
@keyframes spk{0%,100%{transform:translateY(0) rotate(0deg);opacity:.7}50%{transform:translateY(-22px) rotate(180deg);opacity:1}}

/* clouds */
.cloud{position:fixed;z-index:2;transition:opacity 1.5s;}
.cloud-body{position:relative;border-radius:50px;background:rgba(255,255,255,0.82);}
.cloud-body::before,.cloud-body::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.82);}
#cl1{top:15%;left:5%;}#cl2{top:22%;right:7%;}
#cl1 .cloud-body{width:80px;height:26px;}
#cl1 .cloud-body::before{width:38px;height:38px;top:-17px;left:10px;}
#cl1 .cloud-body::after{width:28px;height:28px;top:-12px;left:38px;}
#cl2 .cloud-body{width:60px;height:20px;}
#cl2 .cloud-body::before{width:30px;height:30px;top:-13px;left:8px;}
#cl2 .cloud-body::after{width:22px;height:22px;top:-9px;left:28px;}
#cl1{animation:flt 7s ease-in-out infinite;}#cl2{animation:flt 9s ease-in-out infinite;animation-delay:-4s;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* stars (night) */
#stars{position:fixed;inset:0;z-index:1;opacity:0;transition:opacity 1.5s;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2.5s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

/* ── BANNER (enemy name) ── */
#enemy-banner{
  position:fixed;top:5%;left:50%;transform:translateX(-50%);
  z-index:55;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  color:white;font-size:16px;padding:6px 18px;border-radius:24px;
  border:1.5px solid rgba(255,255,255,0.2);
  white-space:nowrap;opacity:0;transition:opacity .6s;pointer-events:none;
}
#enemy-banner.show{opacity:1;}

/* ══ ARENA ══ */
#arena{
  position:fixed;bottom:28%;left:0;right:0;
  display:flex;justify-content:center;align-items:flex-end;
  gap:10vw;
  z-index:10;
}

.char-wrap{
  position:relative;display:flex;flex-direction:column;align-items:center;
  transform-origin:bottom center;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.35));
}

/* ── BASE CHAR PARTS ── */
/* Head */
.c-head{position:relative;width:50px;height:46px;border-radius:50%;margin-bottom:-5px;z-index:2;}
.c-ear-l,.c-ear-r{position:absolute;top:-9px;width:13px;height:17px;border-radius:50% 50% 30% 30%;}
.c-ear-l{left:4px;transform:rotate(-12deg);}
.c-ear-r{right:4px;transform:rotate(12deg);}
.c-inner-ear{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:9px;background:rgba(255,160,160,0.55);border-radius:50%;}
.c-helm{position:absolute;top:13px;left:0;right:0;height:13px;border-radius:8px;opacity:.88;}
.c-helm-jewel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;}
.c-eyes{position:absolute;top:25px;left:0;right:0;display:flex;justify-content:center;gap:9px;}
.c-eye{width:9px;height:10px;background:white;border-radius:50%;position:relative;}
.c-eye::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5.5px;height:6.5px;border-radius:50%;}
.c-blush-l{position:absolute;top:32px;left:4px;width:9px;height:5px;background:rgba(255,100,120,0.32);border-radius:50%;}
.c-blush-r{position:absolute;top:32px;right:4px;width:9px;height:5px;background:rgba(255,100,120,0.32);border-radius:50%;}
.c-snout{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:18px;height:13px;border-radius:50%;}
.c-nose{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:7px;height:5px;border-radius:50%;}
/* Body */
.c-body{position:relative;width:50px;height:52px;border-radius:24px 24px 16px 16px;}
.c-belly{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:26px;height:26px;border-radius:50%;}
.c-belt{position:absolute;bottom:0;left:0;right:0;height:12px;border-radius:0 0 16px 16px;}
.c-belt-knot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;}
.c-sword{position:absolute;right:-13px;top:-18px;width:5px;height:56px;background:linear-gradient(180deg,#E8E8E8,#B0B0B0);border-radius:3px 3px 1px 1px;}
.c-sword::before{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);width:13px;height:7px;border-radius:3px;}
.c-sword::after{content:'';position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);width:4px;height:7px;background:#FFD700;border-radius:2px 2px 0 0;}
/* Legs */
.c-legs{display:flex;gap:7px;margin-top:2px;}
.c-leg{width:17px;height:19px;border-radius:7px 7px 9px 9px;}
.c-foot{width:20px;height:7px;border-radius:4px;margin-top:1px;margin-left:-2px;}
/* Shadow */
.char-shadow{width:80%;height:9px;border-radius:50%;background:rgba(0,0,0,0.2);margin-top:2px;transition:transform .3s;}

/* ── SPECIAL PARTS ── */
.c-halo{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  width:36px;height:12px;border-radius:50%;
  border:4px solid #FFD700;background:transparent;
  box-shadow:0 0 8px #FFD700,0 0 16px rgba(255,215,0,0.4);}
.c-robe-bottom{position:absolute;bottom:-6px;left:-4px;right:-4px;height:14px;
  background:inherit;border-radius:0 0 12px 12px;z-index:-1;}
.c-beard{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:20px;height:14px;border-radius:4px 4px 50% 50%;opacity:.85;}
.c-moustache{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:20px;height:5px;border-radius:10px;opacity:.9;}
.c-hat-flat{position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:40px;height:8px;border-radius:3px;}
.c-hat-top{position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  width:22px;height:20px;border-radius:4px;}
.c-crown{position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:38px;height:14px;background:currentColor;clip-path:polygon(0 100%,0 40%,20% 0,40% 40%,60% 0,80% 40%,100% 0,100% 100%);}
.c-laurel{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:40px;height:12px;border-radius:50%;
  border:4px solid #6B8E23;background:transparent;}
.c-arm-staff{position:absolute;left:-16px;top:2px;width:4px;height:48px;border-radius:2px;background:#8B6914;}
.c-arm-staff::after{content:'⭐';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:14px;}
.c-cape{position:absolute;top:4px;right:-10px;width:16px;height:38px;border-radius:0 50% 50% 0;opacity:.7;}
.c-helmet-roman{position:absolute;top:-6px;left:0;right:0;height:16px;border-radius:8px 8px 0 0;}
.c-helmet-roman::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:8px;height:12px;border-radius:4px;background:inherit;}
.c-helmet-roman::after{content:'';position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:30px;height:6px;border-radius:3px;background:rgba(255,0,0,0.7);}
.c-armband{position:absolute;top:4px;left:2px;right:2px;height:10px;border-radius:5px;opacity:.6;}
.c-fur-collar{position:absolute;top:0;left:-2px;right:-2px;height:12px;border-radius:6px;opacity:.85;}
/* Mao collar */
.c-mao-collar{position:absolute;top:0;left:0;right:0;height:14px;border-radius:12px 12px 0 0;opacity:.9;}
/* Kim bouffant hair */
.c-bouffant{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:44px;height:16px;border-radius:50% 50% 30% 30%;}
/* Star badge */
.c-star-badge{position:absolute;top:8px;left:6px;font-size:12px;line-height:1;}
/* Tie */
.c-tie{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:10px;height:26px;clip-path:polygon(20% 0,80% 0,100% 70%,50% 100%,0 70%);opacity:.9;}
/* Turban */
.c-turban{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:46px;height:16px;border-radius:50% 50% 20% 20%;}
/* Toga drape */
.c-toga{position:absolute;top:6px;left:-4px;width:12px;height:32px;border-radius:6px;opacity:.7;}

/* ── Idle animations ── */
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes idleBounceFlip{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-9px)}}
.idle-l{animation:idleBounce 1.8s ease-in-out infinite;}
.idle-r{transform:scaleX(-1);animation:idleBounceFlip 1.8s ease-in-out infinite;}

@keyframes slashAnim{0%{transform:scaleX(1) rotate(0) translateX(0);}40%{transform:scaleX(1) rotate(-10deg) translateX(60px) scale(1.12);}100%{transform:scaleX(1) rotate(0) translateX(0);}}
.attack-l{animation:slashAnim .35s ease-out forwards;}
@keyframes fallEnemy{0%{transform:scaleX(-1) translateY(0) rotate(0);}100%{transform:scaleX(-1) translateY(44px) rotate(55deg);opacity:.2;}}
.defeated-r{animation:fallEnemy .55s ease-out forwards;}
@keyframes fallPlayer{0%{transform:scaleX(1) translateY(0) rotate(0);}100%{transform:scaleX(1) translateY(44px) rotate(-55deg);opacity:.2;}}
.defeated-l{animation:fallPlayer .6s ease-out forwards;}
@keyframes lungeFwd{0%{transform:scaleX(-1) translateX(0);}50%{transform:scaleX(-1) translateX(-80px) rotate(12deg) scale(1.18);}100%{transform:scaleX(-1) translateX(-40px) rotate(6deg) scale(1.1);}}
.lunge-r{animation:lungeFwd .45s ease-out forwards;}
@keyframes runFwd{0%{transform:scaleX(1) translateX(0) translateY(0);}25%{transform:scaleX(1) translateX(20vw) translateY(-16px);}55%{transform:scaleX(1) translateX(50vw) translateY(0);}75%{transform:scaleX(1) translateX(72vw) translateY(-12px);}100%{transform:scaleX(1) translateX(120vw) translateY(0);}}
.run-fwd{animation:runFwd 1.3s cubic-bezier(.4,0,.55,1) forwards;}
@keyframes slideIn{0%{transform:scaleX(-1) translateX(-130vw);}100%{transform:scaleX(-1) translateX(0);}}
.slide-in{animation:slideIn .9s cubic-bezier(.22,1.4,.64,1) forwards;}

/* ══ HUD ══ */
#kill-badge{position:fixed;top:14px;right:14px;z-index:50;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);color:white;font-size:17px;padding:5px 14px;border-radius:28px;border:1.5px solid rgba(255,255,255,0.2);display:none;}
#timer-wrap{position:fixed;top:10%;left:50%;transform:translateX(-50%);width:210px;height:13px;border-radius:10px;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.5);z-index:50;opacity:0;transition:opacity .2s;}
#timer-wrap.show{opacity:1;}
#timer-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,#2ECC71,#FFD700,#FF4757);transition:width linear;}
#exclaim{position:fixed;top:14%;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none;transition:opacity .1s;}
#exclaim.show{opacity:1;}
.ex-bang{font-size:110px;line-height:1;color:#FF4757;text-shadow:0 0 30px rgba(255,71,87,.6),5px 5px 0 #900;animation:exPop .22s cubic-bezier(.34,1.56,.64,1) both;}
.ex-sub{font-size:21px;color:#FF4757;background:white;padding:4px 17px;border-radius:20px;border:3px solid #FF4757;margin-top:-8px;white-space:nowrap;animation:exPop .28s .04s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes exPop{0%{transform:scale(0) rotate(-15deg)}100%{transform:scale(1) rotate(0)}}
#tap-hint{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);z-index:50;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.22);padding:7px 20px;border-radius:24px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;backdrop-filter:blur(3px);animation:hintP 2s ease-in-out infinite;}
@keyframes hintP{0%,100%{opacity:.5}50%{opacity:1}}
#flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:80;transition:opacity .07s;}
#flash.go{opacity:.85;}
#run-block{position:fixed;inset:0;z-index:18;display:none;}
.conf{position:fixed;border-radius:3px;animation:confFall linear forwards;pointer-events:none;z-index:90;}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(800deg);opacity:0}}

/* ══ SCREENS ══ */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;transition:opacity .3s;}
.screen.hidden{opacity:0;pointer-events:none;}
.card{background:white;border-radius:28px;padding:24px 22px 20px;text-align:center;box-shadow:0 18px 48px rgba(0,0,0,.22),0 4px 0 #FFD700;border:3px solid #FFD700;width:88vw;max-width:320px;}
.game-title{font-size:clamp(36px,10vw,50px);color:#1A1A2E;text-shadow:4px 4px 0 #FFD700;line-height:1;}
.game-sub{font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:#aaa;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.preview-row{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin:16px 0 13px;}
.vs-badge{font-size:17px;color:white;background:#FF4757;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #900;flex-shrink:0;margin-bottom:10px;}
.start-btn,.again-btn{font-family:'Fredoka One',cursive;color:white;border:none;outline:none;padding:13px 0;border-radius:50px;cursor:pointer;width:100%;letter-spacing:1px;transition:transform .1s,box-shadow .1s;}
.start-btn{font-size:26px;background:linear-gradient(180deg,#FF6B7A,#FF4757);box-shadow:0 6px 0 #900,0 10px 22px rgba(255,71,87,.35);}
.start-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #900;}
.again-btn{font-size:22px;background:linear-gradient(180deg,#5DE680,#27AE60);box-shadow:0 6px 0 #1a7a40;margin-top:16px;}
.again-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1a7a40;}
.card-hint{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;color:#888;margin-top:11px;line-height:1.4;}
.r-emoji{font-size:64px;display:block;animation:eB .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes eB{0%{transform:scale(0)}100%{transform:scale(1)}}
.r-title{font-size:clamp(40px,12vw,54px);line-height:1;margin-top:2px;color:#FF4757;text-shadow:3px 3px 0 #900;}
.r-streak{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#555;margin-top:10px;line-height:1.5;}
.r-streak span{color:#FF4757;}
.thanks{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:#bbb;margin-top:8px;}
@keyframes cardPop{0%{transform:scale(.3) translateY(80px);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── Villain list ── */
#villain-list-wrap{
  margin-top:12px;
  max-height:130px;
  overflow-y:auto;
  border-radius:14px;
  background:#F9F9F9;
  border:2px solid #F0E8D0;
  padding:6px 4px;
  -webkit-overflow-scrolling:touch;
}
#villain-list-wrap:empty{display:none;}
.villain-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 10px;border-radius:10px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;color:#333;
  animation:vItem .3s cubic-bezier(.34,1.56,.64,1) both;
}
.villain-item:nth-child(odd){background:rgba(255,71,87,0.06);}
.villain-num{font-size:11px;color:#bbb;min-width:18px;text-align:right;}
.villain-emoji{font-size:16px;line-height:1;}
.villain-name{flex:1;text-align:left;}
.villain-check{color:#27AE60;font-size:14px;}
@keyframes vItem{0%{transform:translateX(-12px);opacity:0}100%{transform:translateX(0);opacity:1}}
</style>

function el(tag, cls, style, inner) {
  return `<div class="${cls||''}" style="${style||''}">${inner||''}</div>`;
}

// Build a generic character from a config object

  //         earColor, earInner(bool), sword(bool),

  const turbanHTML = cfg.turban  ? `<div class="c-turban" style="background:${cfg.turban}"></div>` : '';

  const maoColHTML = cfg.maoCollar ? `<div class="c-mao-collar" style="background:${cfg.maoCollar}"></div>` : '';
  const staffHTML  = cfg.staff   ? `<div class="c-arm-staff"></div>` : '';
  const capeHTML   = cfg.cape    ? `<div class="c-cape" style="background:${cfg.cape}"></div>` : '';
  const tieHTML    = cfg.tie     ? `<div class="c-tie" style="background:${cfg.tie}"></div>` : '';
  const togaHTML   = cfg.toga    ? `<div class="c-toga" style="background:${cfg.toga}"></div>` : '';
  const starBadgeHTML = cfg.starBadge ? `<div class="c-star-badge">⭐</div>` : '';

  const innerEar   = cfg.earInner !== false ? `<div class="c-inner-ear"></div>` : '';

  return `
  <div class="c-head" style="background:${cfg.headColor}">
    <div class="c-ear-l" style="background:${cfg.earColor||cfg.headColor}">${innerEar}</div>
    <div class="c-ear-r" style="background:${cfg.earColor||cfg.headColor}">${innerEar}</div>

    <div class="c-helm" style="background:${cfg.helmColor||cfg.bodyColor}">
      <div class="c-helm-jewel" style="background:${cfg.helmJewel||'#FFD700'}"></div>
    </div>
    <div class="c-eyes">
      <div class="c-eye" style=""><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5.5px;height:6.5px;border-radius:50%;background:${cfg.eyeColor||'#2C2C3E'}"></div></div>
      <div class="c-eye" style=""><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5.5px;height:6.5px;border-radius:50%;background:${cfg.eyeColor||'#2C2C3E'}"></div></div>
    </div>
    <div class="c-blush-l"></div><div class="c-blush-r"></div>
    <div class="c-snout" style="background:${cfg.snoutColor||cfg.headColor}">
      <div class="c-nose" style="background:${cfg.noseColor||'#C0776A'}"></div>
    </div>
    ${beardHTML}${moustHTML}
  </div>
  <div class="c-body" style="background:${cfg.bodyColor}">
    ${togaHTML}${capeHTML}${maoColHTML}${furHTML}${armbandHTML}${staffHTML}${tieHTML}${starBadgeHTML}${swordHTML}
    <div class="c-belly" style="background:${cfg.bellyColor||cfg.bodyColor}"></div>
    <div class="c-belt" style="background:${cfg.beltColor||'#2C2C3E'}">
      <div class="c-belt-knot" style="background:${cfg.bellyColor||'rgba(255,255,255,.3)'}"></div>
    </div>
    ${robeHTML}
  </div>
  <div class="c-legs">
    <div><div class="c-leg" style="background:${cfg.legColor||cfg.bodyColor}"></div><div class="c-foot" style="background:${cfg.footColor||'#2C2C3E'}"></div></div>
    <div><div class="c-leg" style="background:${cfg.legColor||cfg.bodyColor}"></div><div class="c-foot" style="background:${cfg.footColor||'#2C2C3E'}"></div></div>
  </div>`;
}

    const el = document.createElement('div');
    el.className = 'conf';
    el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3600);
  }
}

function buildStars() {
  starsEl.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = 2 + Math.random() * 3;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*46}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2.5}s;animation-duration:${1.5+Math.random()*2}s;`;
    starsEl.appendChild(s);
  }
}

function buildSparkles() {
  sparklesEl.innerHTML = '';
  const ems = ['✨','🌟','💫','🌈','💥','⭐','⚡'];
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = ems[Math.floor(Math.random()*ems.length)];
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*70}%;font-size:${18+Math.random()*24}px;animation-delay:${Math.random()*4}s;animation-duration:${2.5+Math.random()*3}s;`;
    sparklesEl.appendChild(s);
  }
}

// ── Background & scene setup ──
function applyBackground(enemy) {
  const bg = enemy.bg;
  skyEl.className    = bg.sky;
  groundEl.className = bg.gnd;
  grassEl.className  = bg.grs;

  // Hide all scene elements
  pyramidEl.style.opacity  = '0';
  colosseumEl.style.opacity= '0';
  kremlinEl.style.opacity  = '0';
  eiffelEl.style.opacity   = '0';
  sparklesEl.style.opacity = '0';
  starsEl.style.opacity    = '0';
  cl1El.style.opacity = cl2El.style.opacity = '1';

  // Show specific scene
  if (enemy.scene === 'pyramid')    pyramidEl.style.opacity   = '1';
  if (enemy.scene === 'colosseum')  colosseumEl.style.opacity = '1';
  if (enemy.scene === 'kremlin')    kremlinEl.style.opacity   = '1';
  if (enemy.scene === 'eiffel')     eiffelEl.style.opacity    = '1';

  // Rainbow = sparkles
  if (bg.sky === 'sky-rainbow') {
    sparklesEl.style.opacity = '1';
    buildSparkles();
    cl1El.style.opacity = cl2El.style.opacity = '0';
  }

  // Night/dark skies = stars
  if (['sky-germany','sky-russia','sky-northkorea','sky-china','sky-france'].includes(bg.sky)) {
    buildStars();
    starsEl.style.opacity = '0.6';
  }
}

// ── Pick enemy ──
function getEnemy() {
  // Last pool repeats for crazy chaos
  const maxIdx = ENEMIES.length - 1;
  if (killCount >= 15) return ENEMIES[maxIdx];
  // Otherwise use kill count to progress through the roster (with some repeat)
  const idx = Math.min(killCount, maxIdx);
  return ENEMIES[idx];
}

// ── Sizing ──
function getPlayerScale() { return Math.min(1.0 + killCount * 0.03, 1.3); }
function getEnemyScale(ms) {
  const t = (ms - 300) / 700;
  return 0.55 + t * 1.5;
}

// ══════════════════════════════════════════════
//  RENDER CHARACTERS
// ══════════════════════════════════════════════
function renderChars() {
  // Player
  innerL.innerHTML = buildChar(JESUS_CFG);
  const ps = getPlayerScale();
  charL.style.transform = `scale(${ps})`;
  charL.style.transformOrigin = 'bottom center';
  shadowL.style.transform = `scaleX(${ps})`;

  // Enemy
  const enemy = getEnemy();
  currentEnemyIdx = ENEMIES.indexOf(enemy);
  innerR.innerHTML = buildChar(enemy.cfg);
  charR.style.transform = 'scaleX(-1)';
  charR.style.transformOrigin = 'bottom center';
  shadowR.style.transform = '';

  charL.className = 'char-wrap idle-l';
  charR.className = 'char-wrap idle-r';

  // Show banner
  bannerEl.textContent = `${enemy.emoji} ${enemy.name}`;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), 2200);

  // Apply bg
  applyBackground(enemy);
}

function applyEnemyScale() {
  const sc = getEnemyScale(REACTION_WINDOW);
  charR.style.transition = 'transform 0.42s cubic-bezier(.34,1.56,.64,1)';
  charR.style.transform  = `scaleX(-${sc}) scaleY(${sc})`;
  shadowR.style.transform = `scaleX(${sc * 0.8})`;

  const t = (REACTION_WINDOW - 300) / 700;
  if (t >= 0.66)      tapHint.textContent = '😰 HUGE villain — breathe, then strike!';
  else if (t >= 0.33) tapHint.textContent = '😤 Medium villain — stay sharp!';
  else                tapHint.textContent = '💀 TINY villain — blink and you lose!';
}

function resetEnemyScale() {
  charR.style.transition = '';
  charR.style.transform  = 'scaleX(-1)';
  shadowR.style.transform = '';
}

// ── Timer bar ──
function startTimer() {
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
  timerWrap.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    timerBar.style.transition = `width ${REACTION_WINDOW}ms linear`;
    timerBar.style.width = '0%';
  }));
}
function stopTimer() {
  timerWrap.classList.remove('show');
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
}

// ══════════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════════
function startGame() {
  killCount = 0;
  defeatedList = [];
  kcEl.style.display = 'none';
  buildStars();
  buildSparkles();
  beginRound();
}

function beginRound() {
  gameState = 'waiting';
  REACTION_WINDOW = 300 + Math.random() * 700;
  renderChars();
  resetEnemyScale();
  exclaimEl.classList.remove('show');
  stopTimer();
  tapHint.textContent = 'Waiting for the signal...';
  showScreen('game');
  if (killCount > 0) { kcEl.style.display = 'block'; kcNum.textContent = killCount; }
  waitTimer = setTimeout(showExclaim, 3000 + Math.random() * 3000);
}

function showExclaim() {
  if (gameState !== 'waiting') return;
  gameState = 'active';
  applyEnemyScale();

  const bang = exclaimEl.querySelector('.ex-bang');
  const sub  = exclaimEl.querySelector('.ex-sub');
  bang.style.animation = 'none'; sub.style.animation = 'none';
  void exclaimEl.offsetWidth;
  bang.style.animation = ''; sub.style.animation = '';

  exclaimEl.classList.add('show');
  startTimer();
  reactTimer = setTimeout(enemyAttacks, REACTION_WINDOW);
}

function playerWins() {
  if (gameState !== 'active') return;
  clearTimeout(reactTimer);
  gameState = 'transitioning';
  exclaimEl.classList.remove('show');
  stopTimer();
  doFlash();

  // Record the defeated villain before incrementing killCount
  const defeated = getEnemy();
  defeatedList.push(defeated);

  killCount++;
  kcNum.textContent = killCount;
  kcEl.style.display = 'block';

  charR.className = 'char-wrap defeated-r';
  setTimeout(confetti, 200);
  runBlock.style.display = 'block';

  setTimeout(() => { charL.className = 'char-wrap attack-l'; }, 80);
  setTimeout(() => { charL.className = 'char-wrap run-fwd';  }, 650);

  setTimeout(() => {
    renderChars();
    resetEnemyScale();
    charR.className = 'char-wrap slide-in';
  }, 2000);

  setTimeout(() => {
    runBlock.style.display = 'none';
    charL.className = 'char-wrap idle-l';
    charR.className = 'char-wrap idle-r';
    charR.style.transform = 'scaleX(-1)';
    gameState = 'waiting';
    exclaimEl.classList.remove('show');
    stopTimer();
    tapHint.textContent = 'Waiting for the signal...';
    waitTimer = setTimeout(showExclaim, 3000 + Math.random() * 3000);
  }, 3000);
}

function enemyAttacks() {
  clearTimeout(waitTimer);
  gameState = 'end';
  exclaimEl.classList.remove('show');
  stopTimer();
  doFlash();

  charR.className = 'char-wrap lunge-r';
  setTimeout(() => { charL.className = 'char-wrap defeated-l'; }, 180);

  setTimeout(() => {
    const n = killCount;
    const enemy = ENEMIES[Math.min(n, ENEMIES.length - 1)];
    if (n === 0)      rStreakEl.innerHTML = `Struck down by <span>${enemy.emoji} ${ENEMIES[0].name}</span>!`;
    else if (n === 1) rStreakEl.innerHTML = `Defeated <span>1 villain</span> before falling!`;
    else              rStreakEl.innerHTML = `Defeated <span>${n} villains</span> before falling!`;

    // Build villain list
    const listWrap = document.getElementById('villain-list-wrap');
    if (defeatedList.length === 0) {
      listWrap.innerHTML = '';
    } else {
      listWrap.innerHTML = defeatedList.map((v, i) =>
        `<div class="villain-item" style="animation-delay:${i * 0.07}s">
          <span class="villain-num">${i + 1}.</span>
          <span class="villain-emoji">${v.emoji}</span>
          <span class="villain-name">${v.name}</span>
          <span class="villain-check">✓</span>
        </div>`
      ).join('');
    }

    showScreen('end');
  }, 950);
}

function goToLanding() {
  gameState = 'landing';
  killCount = 0;
  defeatedList = [];
  clearTimeout(waitTimer); clearTimeout(reactTimer);
  exclaimEl.classList.remove('show');
  stopTimer();
  kcEl.style.display = 'none';
  runBlock.style.display = 'none';
  // Reset to Jerusalem
  skyEl.className    = 'sky-jerusalem';
  groundEl.className = 'gnd-jerusalem';
  grassEl.className  = 'grs-jerusalem';
  pyramidEl.style.opacity = colosseumEl.style.opacity = kremlinEl.style.opacity = eiffelEl.style.opacity = '0';
  starsEl.style.opacity = sparklesEl.style.opacity = '0';
  cl1El.style.opacity = cl2El.style.opacity = '1';
  renderChars();
  buildPreview();
  showScreen('landing');
}

function buildPreview() {
  const pL = document.getElementById('preview-left');
  const pR = document.getElementById('preview-right');
  pL.innerHTML = buildChar(JESUS_CFG);
  pR.innerHTML = buildChar(ENEMIES[0].cfg);
  pL.style.cssText = 'transform:scale(0.62);transform-origin:bottom center;display:block;';
  pR.style.cssText = 'transform:scale(0.62) scaleX(-1);transform-origin:bottom center;display:block;';
}

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
function handleTap(e) {
  if (e.target.closest('button')) return;
  if (gameState === 'waiting') {
    clearTimeout(waitTimer);
    enemyAttacks();
  } else if (gameState === 'active') {
    playerWins();
  }
}

document.getElementById('scr-game').addEventListener('touchstart', handleTap, {passive:true});
document.getElementById('scr-game').addEventListener('mousedown',  handleTap);
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, {passive:false});
document.getElementById('againBtn').addEventListener('click', goToLanding);
document.getElementById('againBtn').addEventListener('touchstart', e => { e.preventDefault(); goToLanding(); }, {passive:false});
document.addEventListener('touchend', e => { if (e.cancelable) e.preventDefault(); }, {passive:false});

// ── Init ──
buildStars();
buildSparkles();
renderChars();
buildPreview();
</script>
</body>
</html>
